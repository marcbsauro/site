    <style>
        :root {
            /* Palette Institutionnelle BDC */
            --bdc-blue: #0b1a30;
            --bdc-red: #ee3124;
            --bdc-white: #ffffff;
            --bdc-bg-dark: #050c18;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bdc-bg-dark);
            color: var(--bdc-white);
            margin: 0;
            overflow-x: hidden;
        }

        body.modal-open {
            overflow: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -10;
            overflow: hidden;
        }

        #zoom-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.1s ease-out;
            filter: brightness(1.15) contrast(1.1) saturate(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(11, 26, 48, 0.2) 0%, var(--bdc-bg-dark) 95%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .nav-blur {
            background: rgba(5, 12, 24, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .red-line-major {
            border-left: 4px solid var(--bdc-red);
        }

        .red-line-minor {
            border-left: 2px solid var(--bdc-red);
        }

        .accent-line-title {
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.5rem;
            color: var(--bdc-white);
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        section {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- EXECUTIVE TICKER --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 0;
            backdrop-filter: blur(10px);
        }

        .ticker {
            display: flex;
            white-space: nowrap;
            animation: ticker-animation 35s linear infinite;
        }

        .ticker:hover {
            animation-play-state: paused;
        }

        @keyframes ticker-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            padding-right: 2.5rem;
        }

        .ticker-segment {
            border-left: 3px solid var(--bdc-red);
            padding-left: 1.25rem;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            color: var(--bdc-white);
            text-transform: uppercase;
        }

        /* --- LOGO BOXES --- */
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            min-height: 11rem;
            width: 14rem;
            background: rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            padding: 1.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .logo-box:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--bdc-red);
            transform: translateY(-5px);
        }

        .company-label {
            color: var(--bdc-white);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.9;
            transition: all 0.3s ease;
            text-align: center;
            line-height: 1.4;
        }

        .logo-img {
            max-height: 55px;
            max-width: 90%;
            object-fit: contain;
            filter: brightness(0) invert(1) opacity(0.8);
            transition: all 0.6s ease;
        }

        .scroll-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            color: white;
        }

        /* --- READER & MODAL --- */
        #reader-overlay, #portrait-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 26, 48, 0.98);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(15px);
        }

        .reader-content {
            max-width: 850px;
            margin: 2rem auto;
            background: var(--bdc-white);
            color: #1a1a1a;
            padding: 1.5rem;
            border-radius: 2px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
        }

        @media (min-width: 768px) {
            .reader-content {
                margin: 4rem auto;
                padding: 4.5rem;
            }
        }

        .reader-close {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--bdc-red);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 1100;
        }

        @media (min-width: 768px) {
            .reader-close {
                top: 2.5rem;
                right: 2.5rem;
                padding: 0.8rem 1.8rem;
            }
        }

        /* --- NAVIGATION IDENTITY --- */
        .nav-identity {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .nav-identity:hover {
            transform: scale(1.02);
        }

        .avatar-container {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--bdc-red);
            background: var(--bdc-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(238, 49, 36, 0.2);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portrait-large {
            max-width: 90vw;
            max-height: 70vh;
            border-radius: 4px;
            border: 4px solid var(--bdc-red);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #bfdbfe;
            margin-bottom: 2rem;
            opacity: 0.7;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 2rem;
            border: 2px solid #0077b5;
            color: #0077b5;
            padding: 0.8rem 1.5rem;
            border-radius: 2px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        .btn-social:hover {
            background: #0077b5;
            color: white;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

                metrics: ["8x Croissance · Turnaround", "55 M$ Quota · Tech Sales", "Top 5 % · Leadership Stratégique", "20 ans+ Expertise · Transformation", "Architecture IA · Gouvernance", "MBA · Adm.A · C.M.C."],
                articles: [
                    {
                        id: "art1",
                        cat: "Innovation & Gouvernance",
                        title: "Avons-nous oublié la définition du mot « Innovation » ?",
                        desc: "Pourquoi nous confondons « polir le passé » avec « bâtir l'avenir ».",
                        socialUrl: "https://www.linkedin.com/pulse/avons-nous-oubli%25C3%25A9-la-d%25C3%25A9finition-du-mot-innovation-marc-b-sauro-nfyme",
                        full: `<p>Je suis récemment tombé sur une publicité d'une grande entreprise de café qui promettait de « réinventer ma routine matinale » grâce à leur « toute nouvelle innovation ».</p><p>Naturellement, je me suis arrêté. J'ai regardé de plus près. En tant que stratège, le mot innovation déclenche immédiatement mon radar. Je m'attendais à un nouveau modèle d'affaires, à une transformation durable de la chaîne d'approvisionnement, ou peut-être à une découverte en science des matériaux éliminant les déchets.</p><p>Au lieu de cela, ladite « innovation » se résumait à un réservoir d'eau rotatif, un temps de chauffe de 3 secondes et un design « plus mince ».</p><p>Il faut arrêter de se mentir. Ce n'est pas de l'innovation. C'est de la Nouveauté (Novelty). Et la différence entre les deux n'est pas seulement sémantique ; c'est la différence entre une entreprise qui prospère et une entreprise qui survit à peine.</p><h3>Le Piège de la Nouveauté</h3><p>Dans son livre Start With Why, Simon Sinek trace une ligne nette entre manipulation et inspiration. Mais pour le PDG moderne, la distinction la plus critique se situe entre la Nouveauté et l'Innovation.</p><ul><li>La Nouveauté, c'est rendre l'ancien produit plus brillant. Cela crée une transaction à court terme.</li><li>L'Innovation, c'est changer les règles du jeu. Cela crée une relation à long terme.</li></ul><p>Lorsque vous ajoutez un « réservoir rotatif » à une machine, vous n'inventez pas l'avenir. Vous optimisez le présent. Vous essayez d'extraire une augmentation des ventes de 2 %. La véritable innovation ne s'intègre pas simplement mieux sur le comptoir ; elle s'intègre mieux dans la vie humaine.</p><h3>La Forteresse vs L'Avant-Poste</h3><p>La plupart d'entre nous passons notre carrière à l'intérieur de ce que j'appelle La Forteresse (votre cœur de métier). Elle est bâtie sur l'efficacité et les résultats trimestriels. Pour innover, vous avez besoin d'un Détachement (Outpost), un système d'exploitation distinct dont le seul but est la découverte et le travail de cannibaliser la Forteresse avant qu'un concurrent ne le fasse.</p><h3>The BID</h3><p>L'Efficacité tue la Découverte. La Découverte gaspille l'Efficacité. J'appelle cela Le Business Innovation Dichotomy (The BID). Arrêtons de célébrer le « Nouveau et Amélioré ». Commençons à bâtir le « Différent et Vital ».</p>`
                    },
                    {
                        id: "art2",
                        cat: "Stratégie & Leadership",
                        title: "Pourquoi la Stratégie est un Pari, et pas une Science.",
                        desc: "L'illusion de la certitude scientifique vs la réalité du casino corporatif.",
                        socialUrl: "https://www.linkedin.com/pulse/pourquoi-la-strat%25C3%25A9gie-est-un-pari-et-pas-une-science-marc-b-sauro-rlvie",
                        full: `<p>Si vous consultez l'ordre du jour d'une réunion de CA, vous verrez beaucoup de mots rassurants : « Optimisation », « Prévisions » et « IA ». Ces mots sont conçus pour donner l'impression d'être scientifiques. Mais c'est une illusion. La réalité est tout autre : l'entreprise moderne n'a rien à voir avec un laboratoire. C'est plutôt un casino. À chaque exercice financier, il faut se présenter à la table avec vos jetons et miser. Cette mise est votre BID. C'est le risque calculé pour la survie. Le problème est que la Startup d'à côté est All-In.</p><h3>Le Pari : Rouge vs Noir</h3><p>Le Rouge est le Cœur Métier (la Forteresse). Quand on mise sur Rouge, on mise sur l'efficacité. Demain ressemblera exactement à aujourd'hui, seulement un peu plus rentable. Le Noir est l'Innovation (l'Avant-Poste). Quand on mise sur Noir, on mise sur la découverte. On parie sur un futur qui n'est pas encore arrivé. Depuis vingt ans, la stratégie standard est de tout miser sur le Rouge. Jusqu'à ce que la roue tourne…</p><h3>Les Cimetières Jumeaux</h3><p>Les entreprises meurent de deux façons : 1. Mort par l'Ordre (Le Piège BlackBerry) en s'optimisant jusqu'à l'extinction. 2. Mort par le Chaos (Le Piège Jawbone) en innovant jusqu'à la faillite sans discipline opérationnelle. Pour survivre, il faut reconnaître le fossé et bâtir le pont.</p>`
                    },

                        full: `<p>Je regardais le ski Slopestyle aux Jeux Olympiques la semaine dernière, et j'ai réalisé que presque tous les athlètes sur le parcours utilisaient des skis à fixations centrées. C'est la fin d'une guerre commencée dans un garage en 1995. Salomon, le géant, a réagi comme une Forteresse : ils ont peint un ski de course en jaune et courbé le tail. C'était de la Nouveauté. Line Skis, un startup, a réagi comme un Avant-Poste en redimensionnant un snowboard. Salomon ne pouvait pas faire ça : sa structure de gouvernance l'aurait tué immédiatement. Dans la plupart des entreprises, le CFO tue les idées d'Avant-Poste pour protéger la Forteresse. Vous avez besoin d'un Double Système d'Exploitation pour créer une Zone de Sécurité.</p>`

                        socialUrl: "https://www.linkedin.com/pulse/arr%25C3%25AAtez-de-b%25C3%25A2tir-des-laboratoires-dinnovation-%25C3%25A0-ponts-marc-b-sauro-4fxcc",
                        full: `<p>Novelty consiste à rendre le passé légèrement meilleur, tandis que l'Innovation consiste à inventer l'avenir. Nestlé a vu juste en construisant un meilleur Modèle de Gouvernance. Pour comprendre Nespresso, il faut comprendre la puissance de Nescafé. Né d'une crise en 1929, Nescafé était la Forteresse : efficace et massive. Puis Eric Favre a inventé Nespresso. Strategiquement, c'était un désastre pour la Forteresse car cela cannibalisait le produit principal. Si Nestlé l'avait traité normalement, la Forteresse l'aurait tué. Le Pont est l'ensemble de règles qui protège le « Vilain Petit Canard » jusqu'à ce qu'il soit assez fort pour survivre.</p>`
