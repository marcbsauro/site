    <style>
        :root {
            /* Palette Institutionnelle BDC */
            --bdc-blue: #0b1a30;
            --bdc-red: #ee3124;
            --bdc-white: #ffffff;
            --bdc-bg-dark: #050c18;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bdc-bg-dark);
            color: var(--bdc-white);
            margin: 0;
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -10; overflow: hidden;
        }

        #zoom-bg {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.1s ease-out;
            filter: brightness(1.1) contrast(1.1);
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(11, 26, 48, 0.3) 0%, var(--bdc-bg-dark) 95%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        .nav-blur {
            background: rgba(5, 12, 24, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .red-line-major { border-left: 4px solid var(--bdc-red); }
        .red-line-minor { border-left: 2px solid var(--bdc-red); }

        .accent-line-title {
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        section {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        section.visible { opacity: 1; transform: translateY(0); }

        /* --- EXECUTIVE TICKER --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ticker {
            display: flex;
            white-space: nowrap;
            animation: ticker-animation 35s linear infinite;
        }

        .ticker:hover { animation-play-state: paused; }

        @keyframes ticker-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item { display: flex; align-items: center; }

        .ticker-segment {
            border-left: 2px solid var(--bdc-red);
            padding: 0 3rem;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--bdc-white);
        }

        /* --- LOGO BOXES --- */
        .logo-box {
            flex-shrink: 0;
            width: 14rem;
            height: 10rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            padding: 1rem;
        }

        .logo-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--bdc-red);
            transform: translateY(-4px);
        }

        .logo-img {
            max-height: 60px;
            max-width: 90%;
            filter: brightness(0) invert(1) opacity(0.7);
            margin-bottom: 1rem;
        }

        .company-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
            text-align: center;
        }

        .scroll-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            color: white;
        }
        .scroll-btn:hover {
            background: rgba(238, 49, 36, 0.9);
            transform: translateY(-50%) scale(1.1);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- READER & MODAL --- */
        #reader-overlay, #portrait-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 12, 24, 0.98);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(15px);
        }

        .reader-content {
            max-width: 850px;
            margin: 2rem auto;
            background: var(--bdc-white);
            color: #1a1a1a;
            padding: 1.5rem;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .reader-content { margin: 4rem auto; padding: 4rem; }
        }

        .reader-close {
            position: fixed;
            top: 1rem; right: 1rem;
            background: var(--bdc-red);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 1100;
        }

        @media (min-width: 768px) {
            .reader-close { top: 2.5rem; right: 2.5rem; padding: 0.8rem 1.8rem; }
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #0077b5;
            color: #0077b5;
            padding: 0.75rem 1.5rem;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-social:hover { background: #0077b5; color: white; }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: white;
            border: 1px solid #e2e8f0;
            color: var(--bdc-blue);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-ghost:hover { background: #f8fafc; border-color: #cbd5e1; }

        .article-body h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            color: var(--bdc-blue);
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.25rem;
        }
        
        .article-body p { margin-bottom: 1.5rem; line-height: 1.8; color: #334155; }
        .article-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.5rem; }
        .article-body li { margin-bottom: 0.75rem; padding-left: 0.5rem; }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #bfdbfe;
            margin-bottom: 2rem;
            opacity: 0.7;
        }

        .portrait-large {
            max-width: 90vw;
            max-height: 70vh;
            border-radius: 4px;
            border: 2px solid var(--bdc-red);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            object-fit: contain;
        }
    </style>
</head>

                "exp10": { title: "HEC Montréal", role: "Certificat | Gestion des Affaires", url: "https://www.hec.ca", full: "<p>Formation avancée en administration, posant les bases de la rigueur analytique appliquée au monde corporatif québécois.</p>" },
                "exp11": { title: "ESG UQAM", role: "MBA en Conseil en Management (C.M.C.)", url: "https://esg.uqam.ca", full: "<p>Maîtrise spécialisée dans la consultation stratégique et le déploiement de modèles d'innovation.</p>" },

                metrics: ["8x Croissance · Turnaround", "55 M$ Quota · Tech Sales", "Top 5 % · Leadership Stratégique", "20 ans+ Expertise · Transformation", "Architecture IA · Gouvernance", "MBA · Adm.A · C.M.C."],
                articles: [
                    { id: "art1", date: "1er février 2026", cat: "Innovation & Gouvernance", title: "Avons-nous oublié la définition du mot « Innovation » ?", desc: "Pourquoi nous confondons « polir le passé » avec « bâtir l'avenir ».", socialUrl: "https://www.linkedin.com/pulse/avons-nous-oubli%25C3%25A9-la-d%25C3%25A9finition-du-mot-innovation-marc-b-sauro-nfyme", full: `<p>Je suis récemment tombé sur une publicité d'une grande entreprise de café qui promettait de « réinventer ma routine matinale » grâce à leur « toute nouvelle innovation ».</p><p>En tant que stratège, le mot innovation déclenche immédiatement mon radar. Ladite « innovation » se résumait à un réservoir d'eau rotatif et un design « plus mince ».</p><p>Il faut arrêter de se mentir. Ce n'est pas de l'innovation. C'est de la Nouveauté (Novelty). Et la différence entre les deux n'est pas seulement sémantique ; c'est la différence entre une entreprise qui prospère et une entreprise qui survit à peine.</p><h3>Le Piège de la Nouveauté</h3><p>Dans son livre Start With Why, Simon Sinek trace une ligne nette entre manipulation et inspiration. Mais pour le PDG moderne, la distinction la plus critique se situe entre la Nouveauté et l'Innovation.</p><ul><li>La Nouveauté, c'est rendre l'ancien produit plus brillant. Cela crée une transaction à court terme.</li><li>L'Innovation, c'est changer les règles du jeu. Cela crée une relation à long terme.</li></ul><p>On le voit partout. Gillette a passé des décennies à ajouter une troisième lame, puis une quatrième, puis une cinquième. Ils ont appelé ça de l'innovation. C'était juste de la physique. Pendant qu'ils étaient obsédés par leurs bandes lubrifiantes (Nouveauté), Dollar Shave Club a changé le modèle d'affaires (Innovation) et a pris leurs parts de marché. La véritable innovation ne s'intègre pas simplement mieux sur le comptoir ; elle s'intègre mieux dans la vie humaine.</p><h3>La Forteresse vs L'Avant-Poste</h3><p>La Forteresse (votre cœur de métier) est bâtie sur l'efficacité. Pour innover, vous avez besoin d'un Détachement (Outpost), un système d'exploitation distinct dont le seul but est la découverte. J'appelle cela Le Business Innovation Dichotomy (The BID). Arrêtons de célébrer le « Nouveau et Amélioré ». Commençons à bâtir le « Différent et Vital ».</p>` },
                    { id: "art2", date: "10 février 2026", cat: "Stratégie & Leadership", title: "Pourquoi la Stratégie est un Pari, et pas une Science.", desc: "L'illusion de la certitude scientifique vs la réalité du casino corporatif.", socialUrl: "https://www.linkedin.com/pulse/pourquoi-la-strat%25C3%25A9gie-est-un-pari-et-pas-une-science-marc-b-sauro-rlvie", full: `<p>Si vous consultez l'ordre du jour d'une réunion de CA, vous verrez beaucoup de mots rassurants : « Optimisation », « Prévisions » et « IA ». Mais c'est une illusion. La réalité est tout autre : l'entreprise moderne n'a rien à voir avec un laboratoire. C'est plutôt un casino. À chaque exercice financier, il faut se présenter à la table avec vos jetons et miser. Cette mise est votre BID. C'est le risque calculé pour la survie. Le Rouge est le Cœur Métier (la Forteresse). Le Noir est l'Innovation (l'Avant-Poste). La solution est de reconnaître le fossé et de bâtir le pont. C'est le temps de faire un BID.</p>` },
                    { id: "art3", date: "22 février 2026", cat: "Innovation & Gouvernance", title: "Pourquoi le CFO tue vos meilleures idées.", desc: "Le problème du « Vilain Petit Canard » en stratégie corporative.", socialUrl: "https://www.linkedin.com/pulse/pourquoi-le-cfo-tue-vos-meilleures-id%25C3%25A9es-marc-b-sauro-cn2qe", full: `<p>Je regardais le ski Slopestyle aux Jeux Olympiques la semaine dernière, et j'ai réalisé quelque chose : presque tous les athlètes sur le parcours utilisaient des skis à fixations centrées. C'est la fin d'une guerre commencée dans un garage en 1995. Salomon, le géant, a réagi comme une Forteresse : ils ont peint un ski de course en jaune et courbé le tail. C'était de la Nouveauté. Line Skis, un startup, a réagi comme un Avant-Poste en redimensionnant un snowboard. Salomon ne pouvait pas faire ça : sa structure de gouvernance l'aurait tué immédiatement. Dans la plupart des entreprises, le CFO tue les idées d'Avant-Poste pour protéger la Forteresse. Vous avez besoin d'un Double Système d'Exploitation pour créer une Zone de Sécurité.</p>` },
                    { id: "art4", date: "2 mars 2026", cat: "Innovation & Gouvernance", title: "Arrêtez de bâtir des laboratoires d'innovation. Commencez à bâtir des ponts.", desc: "L'histoire de Nespresso illustre pourquoi l'isolement ne suffit pas.", socialUrl: "https://www.linkedin.com/pulse/arr%25C3%25AAtez-de-b%25C3%25A2tir-des-laboratoires-dinnovation-%25C3%25A0-ponts-marc-b-sauro-4fxcc", full: `<p>La Nouveauté consiste à rendre le passé légèrement meilleur, tandis que l'Innovation consiste à inventer l'avenir. Nestlé a vu juste en construisant un meilleur Modèle de Gouvernance. Pour comprendre Nespresso, il faut comprendre la puissance de Nescafé. Né d'une crise en 1929, Nescafé était la Forteresse. Nestlé a réussi avec Nespresso parce qu'ils ont su construire le Pont et déclencher toute la puissance de leur chaîne d'approvisionnement pour forcer le marché à exister. Ils n'ont pas laissé la Forteresse tuer l'idée : ils ont attendu que l'idée devienne un géant. Le Pont est l'ensemble de règles qui protège le « Vilain Petit Canard » jusqu'à ce qu'il soit assez fort pour survivre.</p>` },
                    { id: "art5", date: "15 mars 2026", cat: "Finance & Stratégie", title: "Une conversation sur Milton Friedman, le Capital Impatient et le Pari du 1 %.", desc: "Gérer le Capital Impatient en utilisant la règle du 99/1.", socialUrl: "https://www.linkedin.com/pulse/une-conversation-avec-mes-amis-en-finance-sur-milton-le-marc-b-sauro-ozexc", full: `<p>La finance corporative est intrinsèquement plus à l'aise avec le statu quo. Mais l'innovation nécessite le capitalisme d'Adam Smith : le risque entrepreneurial brut. La solution pour un PDG public ? La Règle du 99/1. Engagez 99 % de votre capital envers Friedman (la Forteresse) et isolez 1 % pour Smith (l'Avant-Poste) comme une Option d'achat asymétrique. En isolant l'Avant-Poste par une transparence radicale, Wall Street cesse de punir la marge principale. Dites exactement aux investisseurs à quel jeu vous jouez.</p>` },
                    { id: "art6", date: "28 mars 2026", cat: "Innovation & Gouvernance", title: "Arrêtez de parler d'innovation, bâtissez votre Skunkworks et comblez le Fossé de Gouvernance.", desc: "Comment Lockheed Martin garantit le succès de ses inventions.", socialUrl: "https://www.linkedin.com/pulse/arr%25C3%25AAtez-de-parler-dinnovation-b%25C3%25A2tissez-votre-et-le-foss%25C3%25A9-b-sauro-8jp1e", full: `<p>La règle secrète chez Lockheed Martin est le dogfooding : les équipes internes sont forcées d'utiliser les nouvelles technologies pour résoudre leurs propres problèmes quotidiens. Si votre cœur de métier dépend de l'invention de l'Avant-Poste pour ses opérations, le rejet financier devient impossible. Vous contournez le piège du Capital Impatient car le produit prouve sa valeur opérationnelle.</p>` },
                    { id: "art7", date: "14 avril 2026", cat: "Management & Stratégie", title: "Du Canevas à la Boussole : Connecter le Business Model aux Trois Horizons de McKinsey.", desc: "Bâtir un système d'exploitation stratégique complet.", socialUrl: "https://www.linkedin.com/pulse/du-canevas-%25C3%25A0-la-boussole-connecter-le-business-model-aux-b-sauro-anvne", full: `<p>Un modèle d'affaires n'est jamais statique. Dès que vous projetez ce canevas dans le temps, le besoin d'une feuille de route devient évident. C'est ici qu'interviennent les Trois Horizons de McKinsey pour sécuriser la base, optimiser la croissance et propulser votre avenir. Le Canevas sécurise votre base, la feuille de route optimise votre croissance et les Trois Horizons propulsent votre avenir.</p>` }
                ]

                metrics: ["8x Growth · Turnaround", "$55M Quota Managed", "Top 5% Strategic Leader", "20+ Years Experience", "MBA · Adm.A · C.M.C."],
                articles: [
                    { id: "art1", date: "February 1, 2026", cat: "Innovation & Governance", title: "Have We Forgotten the Definition of \"Innovation\"?", desc: "Why we confuse polishing the past with building the future.", socialUrl: "https://www.linkedin.com/pulse/have-we-forgotten-definition-word-innovation-marc-b-sauro-u6dce", full: `<p>Innovation is about changing the game for a long-term relationship. Most companies spend their careers inside the Fortress (the core business), where metrics are too rigid. To innovate, you need an Outpost: a separate operating system whose job is to cannibalize the Fortress before a competitor does.</p><h3>The Novelty Trap</h3><p>Novelty is about making the old thing shiny. It creates a short-term transaction. Innovation is about changing the game. It creates a long-term relationship. Real innovation fits better into human life, not just on the counter.</p>` },
                    { id: "art2", date: "February 10, 2026", cat: "Strategy & Leadership", title: "Strategy is a Wager, Not a Science.", desc: "The illusion of scientific certainty vs the reality of the corporate casino.", socialUrl: "https://www.linkedin.com/pulse/why-strategy-wager-science-marc-b-sauro-yblue", full: `<p>Modern business is more like a casino than a laboratory. Every fiscal year, you place your wager (BID). Standard strategy is to bet 99% on the Fortress and cover slightly on Innovation. To survive, you must recognize the gap and build the bridge. The wheel is spinning. It is time to make your BID.</p>` },
                    { id: "art3", date: "February 22, 2026", cat: "Innovation & Governance", title: "Why the CFO Kills Your Best Ideas.", desc: "The Ugly Duckling problem in corporate strategy.", socialUrl: "https://www.linkedin.com/pulse/why-cfo-kills-your-best-ideas-marc-b-sauro-8dree", full: `<p>The CFO often kills the best ideas because they protect the Fortress using ROI metrics that don't apply to discovery. You need a Dual Operating System to create a safe zone where Ugly Ducklings can grow. If you judge an innovation by its ability to deliver immediate yield, it will die on the vine.</p>` },
                    { id: "art4", date: "March 2, 2026", cat: "Innovation & Governance", title: "Stop Building Innovation Labs. Start Building Bridges.", desc: "The Nespresso story as strategic proof.", socialUrl: "https://www.linkedin.com/pulse/stop-building-innovation-labs-start-bridges-marc-b-sauro-4fxcc", full: `<p>Nestlé succeeded with Nespresso not by integrating it, but by exiling it to an Outpost. The real victory happened when Nestlé built the Bridge, leveraging its power to force the market into existence. If you can protect the Outpost without abandoning the Fortress, you own the game.</p>` },
                    { id: "art5", date: "March 15, 2026", cat: "Finance & Strategy", title: "A conversation about Milton Friedman, Impatient Capital, and the 1% Wager.", desc: "Managing Impatient Capital using the 99/1 rule.", socialUrl: "https://www.linkedin.com/pulse/stop-blabbing-innovation-build-your-skunkworks-close-gap-b-sauro-z97ae", full: `<p>Corporate Finance is wired to protect predictable yield. But innovation requires Adam Smith's raw entrepreneurial risk. The solution is the 99/1 Rule: publicly commit 99% to the Fortress and isolate 1% for Smith's Outpost.</p>` },
                    { id: "art6", date: "March 28, 2026", cat: "Innovation & Governance", title: "Stop blabbing about innovation, build your Skunkworks, and close the Governance Gap.", desc: "How Lockheed Martin guarantees the success of its inventions.", socialUrl: "https://www.linkedin.com/pulse/arr%25C3%25AAtez-de-parler-dinnovation-b%25C3%25A2tissez-votre-et-le-foss%25C3%25A9-b-sauro-8jp1e", full: `<p>Lockheed Martin's Skunkworks model works because of dogfooding: internal teams are forced to be their own first customers. When the core business relies on the Outpost's invention for its daily operations, financial rejection becomes impossible. Bypassing the Impatient Capital trap is the key to corporate survival.</p>` },
                    { id: "art7", date: "April 14, 2026", cat: "Management & Strategy", title: "From Canvas to Compass: Connecting the Business Model to McKinsey's Three Horizons.", desc: "Connecting the Business Model Canvas to McKinsey's Three Horizons of Growth.", socialUrl: "https://www.linkedin.com/pulse/from-canvas-compass-connecting-business-model-three-marc-b-sauro-wcjwe", full: `<p>A business model is never static. By stretching the Canvas across time, you realize it demands a roadmap. McKinsey's Three Horizons framework provides the structure: Horizon 1 for stabilization, Horizon 2 for optimization, and Horizon 3 for disruptive bets.</p>` }

        let currentLang = 'fr';

        function renderTicker() {
            const container = document.getElementById('ticker-container');
            if (!container) return;
            const data = translations[currentLang].metrics;
            const content = data.map(m => `<div class="ticker-segment">${m}</div>`).join('');
            container.innerHTML = `<div class="ticker-item">${content}</div><div class="ticker-item">${content}</div>`;
        }

        function renderArticles() {
            const grid = document.getElementById('articles-grid');
            if (!grid) return;
            grid.innerHTML = translations[currentLang].articles.map(art => `
                <div class="glass p-8 cursor-pointer hover:border-[#ee3124] transition-all group" onclick="openReader('${art.id}')">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-bold uppercase tracking-widest text-[#ee3124]">${art.cat}</span>
                        <span class="text-[8px] font-bold text-white/30 uppercase tracking-widest">${art.date}</span>
                    </div>
                    <div class="red-line-minor pl-4 mb-4">
                        <h4 class="text-xl font-bold group-hover:translate-x-1 transition-transform leading-tight text-white">${art.title}</h4>
                    </div>
                    <p class="text-white/60 text-sm line-clamp-3 leading-relaxed mb-6 font-light">${art.desc}</p>
                    <span class="text-xs font-bold uppercase tracking-widest border-b border-white/20 pb-1 text-white group-hover:border-white transition-all">
                        ${translations[currentLang]['read-more']}
                    </span>
                </div>
            `).join('');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            initUI();
        }

        function initUI() {
            const toggleBtn = document.getElementById('lang-toggle');
            if (toggleBtn) toggleBtn.innerText = currentLang === 'fr' ? 'EN' : 'FR';
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            renderArticles();
            renderTicker();
        }

        function openPortrait() {
            document.getElementById('portrait-modal').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function closePortrait() {
            document.getElementById('portrait-modal').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        function openExp(id) {
            const data = translations[currentLang][id];
            if (!data) return;
            document.getElementById('reader-title').innerText = data.title;
            document.getElementById('reader-date').innerText = ''; 
            document.getElementById('reader-meta').innerText = data.role;
            document.getElementById('reader-body').innerHTML = data.full;
            const footer = document.getElementById('reader-footer');
            footer.innerHTML = (data.url && data.url !== '#') ? 
                `<a href="${data.url}" target="_blank" class="btn-ghost">${translations[currentLang]['visit-site']}</a>` : '';
            document.getElementById('reader-overlay').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function openReader(id) {
            const art = translations[currentLang].articles.find(a => a.id === id);
            if (!art) return;
            document.getElementById('reader-title').innerText = art.title;
            document.getElementById('reader-date').innerText = art.date;
            document.getElementById('reader-meta').innerText = art.cat;
            document.getElementById('reader-body').innerHTML = art.full;
            const footer = document.getElementById('reader-footer');
            footer.innerHTML = art.socialUrl ? `
                <a href="${art.socialUrl}" target="_blank" class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    ${translations[currentLang]['discuss-social']}
                </a>` : '';
            document.getElementById('reader-overlay').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function closeReader() {
            document.getElementById('reader-overlay').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        function scrollSlider(direction) {
            document.getElementById('logo-slider').scrollBy({ left: direction * 240, behavior: 'smooth' });
        }

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const zoomBg = document.getElementById('zoom-bg');
            if(zoomBg) zoomBg.style.transform = `scale(${1 + (scroll * 0.00025)})`;
            document.querySelectorAll('section').forEach(sec => {
                if(sec.getBoundingClientRect().top < window.innerHeight * 0.95) sec.classList.add('visible');
            });
        });

        window.onload = () => {
            initUI();
            const slider = document.getElementById('logo-slider');
            if (slider) {
                const items = Array.from(slider.children);
                items.forEach(item => slider.appendChild(item.cloneNode(true)));
            }
        };
    </script>
