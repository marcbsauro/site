<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marc B. Sauro | Stratège & Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bdc-blue: #0b1a30;
            --bdc-red: #ee3124;
            --bdc-white: #ffffff;
            --bdc-bg-dark: #050c18;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bdc-bg-dark);
            color: var(--bdc-white);
            margin: 0;
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -10; overflow: hidden;
        }

        #zoom-bg {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.1s ease-out;
            filter: brightness(1.1) contrast(1.1);
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(11, 26, 48, 0.3) 0%, var(--bdc-bg-dark) 95%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        .nav-blur {
            background: rgba(5, 12, 24, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .red-line-major { border-left: 4px solid var(--bdc-red); }

        .accent-line-title {
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        section {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        section.visible { opacity: 1; transform: translateY(0); }

        /* --- EXECUTIVE TICKER (15s) --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ticker {
            display: flex;
            white-space: nowrap;
            animation: ticker-animation 15s linear infinite;
        }

        .ticker:hover { animation-play-state: paused; }

        @keyframes ticker-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-33.33%); }
        }

        .ticker-item { display: flex; align-items: center; }

        .ticker-segment {
            border-left: 2px solid var(--bdc-red);
            padding: 0 3rem;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--bdc-white);
        }

        /* --- LOGO BOXES --- */
        .logo-box {
            flex-shrink: 0;
            width: 14rem;
            height: 10rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            padding: 1rem;
        }

        .logo-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--bdc-red);
            transform: translateY(-4px);
        }

        .logo-img {
            max-height: 45px;
            max-width: 80%;
            filter: brightness(0) invert(1) opacity(0.7);
            margin-bottom: 1rem;
        }

        .company-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
            text-align: center;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- READER & MODAL --- */
        #reader-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 12, 24, 0.98);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(15px);
        }

        .reader-content {
            max-width: 800px;
            margin: 4rem auto;
            background: var(--bdc-white);
            color: #1a1a1a;
            padding: 4rem;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img src="background.jpg" id="zoom-bg" alt="Marc B. Sauro">
        <div class="overlay"></div>
    </div>

    <nav class="fixed top-0 w-full z-50 nav-blur">
        <div class="max-w-6xl mx-auto px-8 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-[#ee3124] bg-slate-900">
                    <img src="portrait.jpg" alt="MBS" class="w-full h-full object-cover">
                </div>
                <div class="text-xl font-bold tracking-tighter italic">MBS<span class="text-[#ee3124]">.</span></div>
            </div>
            <button id="lang-toggle" onclick="toggleLanguage()" class="text-[10px] font-bold tracking-[0.2em] border border-white/20 px-4 py-2 hover:bg-white hover:text-black transition-all">EN</button>
        </div>
    </nav>

    <main class="relative z-10 pt-48 pb-24">
        <section id="hero" class="max-w-4xl mx-auto px-8 mb-32 visible">
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-8 leading-none" data-key="name"></h1>
            <div class="accent-line-title">
                <h2 class="text-lg md:text-xl font-semibold tracking-[0.15em] uppercase text-white/90" data-key="title"></h2>
            </div>
            <p class="text-xl md:text-2xl text-white/70 max-w-2xl mt-12 font-light leading-relaxed" data-key="hero-p"></p>
        </section>

        <section class="ticker-wrap mb-32 visible">
            <div id="ticker-container" class="ticker"></div>
        </section>

        <div class="max-w-4xl mx-auto px-8">
            <section class="glass p-10 md:p-16 mb-32 scroll-reveal">
                <h3 class="text-[10px] font-bold uppercase tracking-[0.4em] text-[#ee3124] mb-8" data-key="about-label"></h3>
                <div class="red-line-major pl-8">
                    <p class="text-xl md:text-2xl font-light leading-relaxed mb-16" data-key="summary"></p>
                    
                    <div class="space-y-12">
                        <div class="group">
                            <h4 class="text-xs font-bold uppercase tracking-widest text-[#ee3124] mb-2" data-key="skill1-title"></h4>
                            <p class="text-lg font-light text-white/80 leading-relaxed" data-key="skill1-desc"></p>
                        </div>
                        <div class="group">
                            <h4 class="text-xs font-bold uppercase tracking-widest text-[#ee3124] mb-2" data-key="skill2-title"></h4>
                            <p class="text-lg font-light text-white/80 leading-relaxed" data-key="skill2-desc"></p>
                        </div>
                        <div class="group">
                            <h4 class="text-xs font-bold uppercase tracking-widest text-[#ee3124] mb-2" data-key="skill3-title"></h4>
                            <p class="text-lg font-light text-white/80 leading-relaxed" data-key="skill3-desc"></p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mb-32">
                <h3 class="text-[10px] font-bold uppercase tracking-[0.4em] text-white/40 mb-8" data-key="exp-label"></h3>
                <div id="logo-slider" class="flex overflow-x-auto gap-4 pb-4 hide-scrollbar snap-x scroll-smooth">
                    <div class="logo-box snap-center"><img src="logo1.png" class="logo-img"><span class="company-label">Dassault Systèmes</span></div>
                    <div class="logo-box snap-center"><img src="logo2.png" class="logo-img"><span class="company-label">Autodesk</span></div>
                    <div class="logo-box snap-center"><img src="logo4.png" class="logo-img"><span class="company-label">Vent de la Savane</span></div>
                    <div class="logo-box snap-center"><img src="esg_logo.png" class="logo-img"><span class="company-label">ESG UQAM</span></div>
                </div>
            </section>

            <section id="articles" class="mb-32">
                <h3 class="text-[10px] font-bold uppercase tracking-[0.4em] text-white/40 mb-8" data-key="articles-label"></h3>
                <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </section>
        </div>
    </main>

    <div id="reader-overlay">
        <div class="max-w-4xl mx-auto px-4">
            <button class="fixed top-8 right-8 bg-[#ee3124] text-white px-6 py-2 font-bold uppercase text-xs tracking-widest z-[1100]" onclick="closeReader()">Fermer</button>
            <article class="reader-content">
                <h1 id="reader-title" class="text-4xl font-bold mb-4 tracking-tight"></h1>
                <p id="reader-meta" class="text-xs font-bold text-[#ee3124] uppercase tracking-widest mb-8 border-b pb-4"></p>
                <div id="reader-body" class="prose max-w-none text-lg leading-relaxed text-gray-800"></div>
            </article>
        </div>
    </div>

    <script>
        const translations = {
            fr: {
                name: "Marc B. Sauro",
                title: "Conseiller Stratégique | Transformation",
                "hero-p": "Convertir la vision en trajectoires opérationnelles et en stratégies d'exécution tangibles pour maximiser la valeur d'affaires.",
                "about-label": "Axes d'intervention",
                "summary": "Leader bilingue en services-conseils avec plus de 20 ans d'expertise. Candidat au MBA à l'ESG UQAM, je me spécialise dans la conversion des ambitions décisionnelles en trajectoires opérationnelles tangibles.",
                "skill1-title": "Diagnostic Organisationnel et Stratégique",
                "skill1-desc": "Analyse critique des modèles d'affaires et identification des leviers d'optimisation pour sécuriser la rentabilité et la pérennité opérationnelle.",
                "skill2-title": "Architecture de Solutions et Optimisation des Investissements",
                "skill2-desc": "Conception de cadres opérationnels et technologiques alignés sur les objectifs de croissance, garantissant la maximisation de la valeur d'affaires.",
                "skill3-title": "Vision et Innovation Stratégique",
                "skill3-desc": "Transformation de la vision exécutive en trajectoires d'exécution concrètes pour les organisations en phase de transition majeure.",
                "exp-label": "Trajectoire", 
                "articles-label": "Vision et Innovation Stratégique", 
                metrics: ["8x Croissance", "55 M$ Quota", "Top 5 % Leadership", "20 ans Expertise", "MBA · Adm.A · C.M.C."],
                articles: [
                    { id: "art1", cat: "Innovation", title: "Avons-nous oublié la définition du mot « Innovation » ?", desc: "Pourquoi nous confondons « polir le passé » avec « bâtir l'avenir ».", full: "<p>L'Innovation change les règles du jeu pour une relation long terme...</p>" }
                ]
            },
            en: {
                name: "Marc B. Sauro",
                title: "Strategic Advisor | Transformation",
                "hero-p": "Converting vision into operational trajectories and tangible execution strategies to maximize business value.",
                "about-label": "Core Expertise",
                "summary": "Bilingual Management Consulting Leader with over 20 years of expertise. MBA candidate at ESG UQAM, specializing in converting executive ambitions into actionable roadmaps.",
                "skill1-title": "Strategic & Organizational Diagnostics",
                "skill1-desc": "Rigorous business model analysis and identification of optimization levers to secure immediate profitability and long-term resilience.",
                "skill2-title": "Solutions Architecture & Investment Optimization",
                "skill2-desc": "Designing operational and technological frameworks aligned with growth objectives, ensuring the maximization of business value.",
                "skill3-title": "Vision & Strategic Innovation",
                "skill3-desc": "Transforming executive vision into concrete execution trajectories for organizations navigating major transitions.",
                "exp-label": "Trajectory", 
                "articles-label": "Vision & Strategic Innovation", 
                metrics: ["8x Growth", "$55M Quota", "Top 5% Leader", "20+ Years Exp", "MBA · Adm.A · C.M.C."],
                articles: [
                    { id: "art1", cat: "Innovation", title: "Have We Forgotten the Definition of \"Innovation\"?", desc: "Why we confuse polishing the past with building the future.", full: "<p>Innovation is about changing the game for a long-term relationship...</p>" }
                ]
            }
        };

        let currentLang = 'fr';

        function renderTicker() {
            const container = document.getElementById('ticker-container');
            const data = translations[currentLang].metrics;
            const content = data.map(m => `<div class="ticker-segment">${m}</div>`).join('');
            container.innerHTML = `<div class="ticker-item">${content}</div><div class="ticker-item">${content}</div><div class="ticker-item">${content}</div>`;
        }

        function renderArticles() {
            const grid = document.getElementById('articles-grid');
            grid.innerHTML = translations[currentLang].articles.map(art => `
                <div class="glass p-8 cursor-pointer hover:border-[#ee3124] transition-all group" onclick="openReader('${art.id}')">
                    <span class="text-[9px] font-bold uppercase tracking-widest text-[#ee3124] mb-4 block">${art.cat}</span>
                    <h4 class="text-xl font-bold mb-4 group-hover:translate-x-1 transition-transform">${art.title}</h4>
                    <p class="text-white/50 text-sm">${art.desc}</p>
                </div>
            `).join('');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            document.getElementById('lang-toggle').innerText = currentLang === 'fr' ? 'EN' : 'FR';
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if(translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            renderArticles(); renderTicker();
        }

        function openReader(id) {
            const art = translations[currentLang].articles.find(a => a.id === id);
            if(!art) return;
            document.getElementById('reader-title').innerText = art.title;
            document.getElementById('reader-meta').innerText = art.cat;
            document.getElementById('reader-body').innerHTML = art.full;
            document.getElementById('reader-overlay').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function closeReader() {
            document.getElementById('reader-overlay').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            document.getElementById('zoom-bg').style.transform = `scale(${1 + (scroll * 0.0002)})`;
            document.querySelectorAll('section').forEach(sec => {
                if(sec.getBoundingClientRect().top < window.innerHeight * 0.95) sec.classList.add('visible');
            });
        });

        window.onload = () => {
            renderTicker(); renderArticles(); toggleLanguage();
            window.dispatchEvent(new Event('scroll'));
        };
    </script>
</body>
</html>
