    <style>
        :root {
            --bdc-blue: #0b1a30;
            --bdc-red: #ee3124;
            --bdc-white: #ffffff;
            --bdc-bg-dark: #050c18;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bdc-bg-dark);
            color: var(--bdc-white);
            margin: 0;
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -10; overflow: hidden;
        }

        #zoom-bg {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.1s ease-out;
            filter: brightness(1.1) contrast(1.1);
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(11, 26, 48, 0.3) 0%, var(--bdc-bg-dark) 95%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        .nav-blur {
            background: rgba(5, 12, 24, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .red-line-major { border-left: 4px solid var(--bdc-red); }
        .red-line-minor { border-left: 2px solid var(--bdc-red); }

        .accent-line-title {
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        section {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        section.visible { opacity: 1; transform: translateY(0); }

        /* --- EXECUTIVE TICKER --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ticker {
            display: flex;
            white-space: nowrap;
            animation: ticker-animation 35s linear infinite;
        }

        .ticker:hover { animation-play-state: paused; }

        @keyframes ticker-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item { display: flex; align-items: center; }

        .ticker-segment {
            border-left: 2px solid var(--bdc-red);
            padding: 0 3rem;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--bdc-white);
        }

        /* --- LOGO BOXES --- */
        .logo-box {
            flex-shrink: 0;
            width: 14rem;
            height: 10rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            padding: 1rem;
        }

        .logo-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--bdc-red);
            transform: translateY(-4px);
        }

        .logo-img {
            max-height: 60px;
            max-width: 90%;
            filter: brightness(0) invert(1) opacity(0.7);
            margin-bottom: 1rem;
        }

        .company-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
            text-align: center;
        }

        .scroll-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            color: white;
        }
        .scroll-btn:hover {
            background: rgba(238, 49, 36, 0.9);
            transform: translateY(-50%) scale(1.1);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- READER & MODAL --- */
        #reader-overlay, #portrait-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 12, 24, 0.98);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(15px);
        }

        .reader-content {
            max-width: 850px;
            margin: 2rem auto;
            background: var(--bdc-white);
            color: #1a1a1a;
            padding: 1.5rem;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .reader-content { margin: 4rem auto; padding: 4rem; }
        }

        .reader-close {
            position: fixed;
            top: 1rem; right: 1rem;
            background: var(--bdc-red);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 1100;
        }

        @media (min-width: 768px) {
            .reader-close { top: 2.5rem; right: 2.5rem; padding: 0.8rem 1.8rem; }
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #0077b5;
            color: #0077b5;
            padding: 0.75rem 1.5rem;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-social:hover { background: #0077b5; color: white; }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: white;
            border: 1px solid #e2e8f0;
            color: var(--bdc-blue);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-ghost:hover { background: #f8fafc; border-color: #cbd5e1; }

        .article-body h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            color: var(--bdc-blue);
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.25rem;
        }
        
        .article-body p { margin-bottom: 1.5rem; line-height: 1.8; color: #334155; }
        .article-body ul { list-style-type: none; margin-bottom: 1.5rem; padding-left: 0; }
        .article-body li { margin-bottom: 0.75rem; padding-left: 1.5rem; position: relative; }
        .article-body li::before { content: "•"; color: var(--bdc-red); position: absolute; left: 0; font-weight: bold; }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #bfdbfe;
            margin-bottom: 2rem;
            opacity: 0.7;
        }

        .portrait-large {
            max-width: 90vw;
            max-height: 70vh;
            border-radius: 4px;
            border: 2px solid var(--bdc-red);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            object-fit: contain;
        }
    </style>

                        title: "Avons-nous oublié la définition du mot « Innovation » ?",
                        desc: "Pourquoi nous confondons « polir le passé » avec « bâtir l'avenir ».",
                        socialUrl: "https://www.linkedin.com/pulse/avons-nous-oubli%25C3%25A9-la-d%25C3%25A9finition-du-mot-innovation-marc-b-sauro-nfyme",
                        full: `<p>Je suis récemment tombé sur une publicité d'une grande entreprise de café qui promettait de « réinventer ma routine matinale » grâce à leur « toute nouvelle innovation ».</p>
                        <p>Naturellement, je me suis arrêté. J'ai regardé de plus près. En tant que stratège, le mot innovation déclenche immédiatement mon radar. Je m'attendais à un nouveau modèle d'affaires, à une transformation durable de la chaîne d'approvisionnement, ou peut-être à une découverte en science des matériaux éliminant les déchets.</p>
                        <p>Au lieu de cela, ladite « innovation » se résumait à :</p>
                        <ul><li>Un réservoir d'eau rotatif.</li><li>Un temps de chauffe de 3 secondes.</li><li>Un design « plus mince ».</li></ul>
                        <p>Il faut arrêter de se mentir. Ce n'est pas de l'innovation. C'est de la Nouveauté (Novelty). Et la différence entre les deux n'est pas seulement sémantique ; c'est la différence entre une entreprise qui prospère et une entreprise qui survit à peine.</p>
                        <h3>Le Piège de la Nouveauté</h3>
                        <p>Dans son livre Start With Why, Simon Sinek trace une ligne nette entre manipulation et inspiration. Mais pour le PDG moderne, la distinction la plus critique se situe entre la Nouveauté et l'Innovation.</p>
                        <ul><li><strong>La Nouveauté</strong>, c'est rendre l'ancien produit plus brillant. C'est le fameux « Nouveau et Amélioré ! ». Cela crée une transaction à court terme.</li><li><strong>L'Innovation</strong>, c'est changer les règles du jeu. Cela crée une relation à long terme.</li></ul>
                        <p>Gillette a passé des décennies à ajouter une troisième lame, puis une quatrième, puis une cinquième. Ils ont appelé ça de l'innovation. C'était juste de la physique. Pendant qu'ils étaient obsédés par leurs bandes lubrifiantes (Nouveauté), Dollar Shave Club a changé le modèle d'affaires (Innovation) et a pris leurs parts de marché. La véritable innovation ne s'intègre pas simplement mieux sur le comptoir ; elle s'intègre mieux dans la vie humaine.</p>
                        <h3>La Forteresse vs L'Avant-Poste</h3>
                        <p>La plupart d'entre nous passons notre carrière à l'intérieur de ce que j'appelle La Forteresse. La Forteresse est votre cœur de métier (Core Business). Elle est bâtie sur l'efficacité, la prévisibilité et les résultats trimestriels. Son travail est de protéger les flux de revenus. Mais vous ne pouvez pas inventer l'avenir à l'intérieur d'une Forteresse. Les murs sont trop épais. Les métriques sont trop rigides.</p>
                        <p>Pour innover, vous avez besoin d'un Détachement (Outpost). Le Détachement est un système d'exploitation distinct. Son seul but est la découverte. Son travail est de cannibaliser la Forteresse avant qu'un concurrent ne le fasse.</p>
                        <h3>Le Fossé de Gouvernance</h3>
                        <p>J'ai vu cette tension de première main au début de ma carrière. J'étais à une conférence pour une grande entreprise de logiciels de CAO. Le PDG est monté sur scène et a dit quelque chose qui a coupé le souffle à la salle : « Nous devons redevenir les jeunes dans le garage qui imaginent ce que nos solutions pourraient devenir. Nous devons tuer notre propre produit phare. »</p>
                        <p>L'auditoire, composé majoritairement d'employés et de partenaires vivant confortablement à l'intérieur de la Forteresse, n'a pas compris. Ils étaient horrifiés. Pourquoi tuerions-nous la poule aux œufs d'or ? Ce PDG essayait de construire un Avant-Poste. Il essayait de faire un BID (un Pari) sur l'avenir. Mais la Forteresse l'a rejeté comme un virus.</p>
                        <h3>Le Business Innovation Dichotomy (The BID)</h3>
                        <p>L'Efficacité tue la Découverte. La Découverte gaspille l'Efficacité. J'appelle cela Le Business Innovation Dichotomy (The BID). Au cours des prochaines semaines, je publierai en série le manuel pour naviguer ce fossé. Nous examinerons des entreprises comme BlackBerry (morte dans la Forteresse) et Jawbone (morte dans le Détachement), et nous disséquerons les rares organisations qui ont réussi à jeter un pont entre les deux. Arrêtons de célébrer le « Nouveau et Amélioré ». Commençons à bâtir le « Différent et Vital ».</p>
                        <p><strong>Votre équipe construit-elle des fonctionnalités, ou construit-elle l'avenir ?</strong></p>`
                    },
                    {
                        id: "art2",
                        cat: "Stratégie & Leadership",
                        title: "Pourquoi la Stratégie est un Pari, et pas une Science.",
                        desc: "L'illusion de la certitude scientifique vs la réalité du casino corporatif.",
                        socialUrl: "https://www.linkedin.com/pulse/pourquoi-la-strat%25C3%25A9gie-est-un-pari-et-pas-une-science-marc-b-sauro-rlvie",
                        full: `<p>Si vous consultez l'ordre du jour d'une réunion de CA, vous verrez beaucoup de mots rassurants. Vous verrez « Optimisation », « Prévisions » et, maintenant, « IA ». Ces mots sont conçus pour donner l'impression d'être scientifiques. Mais c'est une illusion.</p>
                        <p>La réalité est tout autre : l'entreprise moderne n'a rien à voir avec un laboratoire. C'est plutôt un casino. À chaque exercice financier, il faut se présenter à la table avec vos jetons (vos revenus, vos talents et votre temps) et miser. Cette mise est votre BID. C'est le risque calculé pour la survie.</p>
                        <p>Le problème n'est pas que les entreprises établies refusent de parier. Le problème est que la plupart des dirigeants parient sur un jeu qui n'existe plus. Le plus gros problème est que la Startup d'à côté est All-In.</p>
                        <h3>Le Pari : Rouge vs Noir</h3>
                        <p>Le Rouge est le Cœur Métier. C'est la « Forteresse ». Quand on mise sur Rouge, on mise sur l'efficacité. Demain ressemblera exactement à aujourd'hui, seulement un peu plus rentable. Le pari est sur les clients, et uniquement les clients actuels. Le Noir est l'Innovation. C'est l'« Avant-Poste ». Quand on mise sur Noir, on mise sur la découverte. On parie sur ce qui nous anime. On parie sur un futur qui n'est pas encore arrivé.</p>
                        <h3>Les Cimetières Jumeaux</h3>
                        <p>L'histoire est remplie d'entreprises qui ont traité le Jeu Infini comme un Pari Fini. Elles meurent généralement de deux façons :</p>
                        <p><strong>1. Mort par l'Ordre (Le Piège BlackBerry)</strong> : Research in Motion (BlackBerry) était la Forteresse ultime. Ils avaient le réseau le plus sécurisé. Quand l'iPhone est apparu, ils ont regardé les données. Selon toutes les métriques de la Forteresse, c'était un mauvais produit. Alors, ils ont doublé la mise sur l'efficacité. Ils se sont optimisés jusqu'à l'extinction.</p>
                        <p><strong>2. Mort par le Chaos (Le Piège Jawbone)</strong> : À l'opposé, nous avons Jawbone. Ils étaient des parieurs « Noirs » purs. Mais ils n'avaient pas de Forteresse. Il leur manquait la discipline opérationnelle. Ils ont innové jusqu'à la faillite.</p>
                        <h3>The BID</h3>
                        <p>Pour survivre ce trimestre, il faut être BlackBerry. On a besoin de la Forteresse. On a besoin de discipline. Pour survivre à la prochaine décennie, on doit être l'Anti-BlackBerry. On a besoin de l'Avant-Poste. Ces deux systèmes d'exploitation se détestent. L'Efficacité tue la Découverte. La Découverte gaspille l'Efficacité. La solution est de reconnaître le fossé et de bâtir le pont. La roue tourne. C'est le temps de faire un BID.</p>`
                    },
                    {
                        id: "art3",
                        cat: "Innovation & Gouvernance",
                        title: "Pourquoi le CFO tue vos meilleures idées.",
                        desc: "Le problème du « Vilain Petit Canard » en stratégie corporative.",
                        socialUrl: "https://www.linkedin.com/pulse/pourquoi-le-cfo-tue-vos-meilleures-id%25C3%25A9es-marc-b-sauro-cn2qe",
                        full: `<p>Je regardais le ski Slopestyle aux Jeux Olympiques la semaine dernière, et j'ai réalisé quelque chose : presque tous les athlètes sur le parcours utilisaient des skis à fixations centrées. C'est la fin d'une guerre commencée dans un garage en 1995. Salomon, le géant, a réagi comme une Forteresse : ils ont peint un ski de course en jaune et courbé le tail. C'était de la Nouveauté. Line Skis, un startup, a réagi comme un Avant-Poste en redimensionnant un snowboard pour correspondre au comportement des nouveaux riders. Salomon ne pouvait pas faire ça : sa structure de gouvernance l'aurait tué immédiatement.</p>
                        <h3>Le Problème du Vilain Petit Canard</h3>
                        <p>C'est ce que j'appelle le Fossé de Gouvernance. Dans la plupart des entreprises, chaque nouvelle idée est jugée selon les métriques de la Forteresse : ROI, BAIIA (EBITDA) et Scale. L'idée d'Avant-Poste ressemble alors toujours à un Vilain Petit Canard. Alors le Directeur Financier la tue, non pas par malveillance, mais parce qu'il fait son travail : protéger la Forteresse. Intel a fait cela en 2006 en refusant le contrat pour la puce iPhone car les marges étaient minces.</p>
                        <h3>Le Kill Switch</h3>
                        <p>Nous avons construit une machine corporative conçue pour traquer et détruire la variance. Mais l'innovation est diversité. Si vous optimisez pour l'efficacité, vous l'optimisez par inadvertance pour la stérilité. Les startups gagnent parce qu'elles n'ont pas de « Kill Switch ». La solution est de changer les règles du pari : vous ne pouvez pas gouverner l'Avant-Poste avec les lois de la Forteresse. Vous avez besoin d'un Double Système d'Exploitation.</p>`
                    },
                    {
                        id: "art4",
                        cat: "Innovation & Gouvernance",
                        title: "Arrêtez de bâtir des laboratoires d'innovation. Commencez à bâtir des ponts.",
                        desc: "L'histoire de Nespresso illustre pourquoi l'isolement ne suffit pas.",
                        socialUrl: "https://www.linkedin.com/pulse/arr%25C3%25AAtez-de-b%25C3%25A2tir-des-laboratoires-dinnovation-%25C3%25A0-ponts-marc-b-sauro-4fxcc",
                        full: `<p>La Nouveauté consiste à rendre le passé légèrement meilleur, tandis que l'Innovation consiste à inventer l'avenir. Nestlé a vu juste en construisant un meilleur Modèle de Gouvernance. Pour comprendre Nespresso, il faut comprendre la puissance de Nescafé. Né d'une crise en 1929, Nescafé était la Forteresse : efficace et massive. Puis Eric Favre a inventé Nespresso. Strategiquement, c'était un désastre pour la Forteresse car cela cannibalisait le produit principal. Si Nestlé l'avait traité normalement, la Forteresse l'aurait tué.</p>
                        <h3>Le Pont Stratégique</h3>
                        <p>Nestlé l'a exilé en créant une entité légale distincte : l'Avant-Poste. Mais l'isolement est facile, l'intégration est la guerre. Nespresso a réussi parce que Nestlé a su quand construire le Pont et déclencher toute la puissance de sa chaîne d'approvisionnement pour forcer le marché à exister. Le Pont est l'ensemble de règles qui protège le « Vilain Petit Canard » jusqu'à ce qu'il soit assez fort pour survivre au BOARDROOM.</p>`
                    },
                    {
                        id: "art5",
                        cat: "Finance & Stratégie",
                        title: "Une conversation sur Milton Friedman, le Capital Impatient et le Pari du 1 %.",
                        desc: "Gérer le Capital Impatient en utilisant la règle du 99/1.",
                        socialUrl: "https://www.linkedin.com/pulse/une-conversation-avec-mes-amis-en-finance-sur-milton-le-marc-b-sauro-ozexc",
                        full: `<p>La finance corporative est intrinsèquement plus à l'aise avec le statu quo car son rendement est prévisible. Ils sont programmés pour protéger le cœur de métier. Mais ce n'est pas de leur faute, c'est la faute de la philosophie de Milton Friedman qu'on leur force à utiliser. Friedman a soutenu que la seule responsabilité d'une entreprise est d'augmenter ses profits (ceux d'aujourd'hui). Mais la véritable innovation nécessite le capitalisme d'Adam Smith : le risque entrepreneurial brut.</p>
                        <h3>La Règle du 99/1</h3>
                        <p>Les marchés boursiers représentent le Capital Impatient. Comment un PDG public peut-il inventer l'avenir quand sa rémunération est liée aux 90 prochains jours ? La solution est la Règle du 99/1. Engagez 99 % de votre capital envers Friedman (la Forteresse) et isolez 1 % pour Smith (l'Avant-Poste) comme une Option d'achat asymétrique. En isolant l'Avant-Poste par une transparence radicale (modèle Alphabet), Wall Street cesse de punir la marge principale. Dites exactement aux investisseurs à quel jeu vous jouez.</p>`
                    },
                    {
                        id: "art6",
                        cat: "Innovation & Gouvernance",
                        title: "Arrêtez de parler d'innovation, bâtissez votre Skunkworks et comblez le Fossé de Gouvernance.",
                        desc: "Comment Lockheed Martin garantit le succès de ses inventions.",
                        socialUrl: "https://www.linkedin.com/pulse/arr%25C3%25AAtez-de-parler-dinnovation-b%25C3%25A2tissez-votre-et-le-foss%25C3%25A9-b-sauro-8jp1e",
                        full: `<p>En 1943, Lockheed Martin a éliminé la bureaucratie corporative pour construire un avion de chasse révolutionnaire : le Skunkworks était né. Mais l'autonomie sans structure mène à l'échec. Le point de défaillance critique est le Fossé de Gouvernance entre l'Avant-Poste et la Forteresse. Le cœur de métier est régi par le Capital Impatient qui exige un ROI immédiat et rejette naturellement le nouvel organe.</p>
                        <h3>La Force du Dogfooding</h3>
                        <p>Comment garantir le succès ? En bâtissant le Pont. La règle secrète chez Lockheed Martin est le dogfooding : les équipes internes sont forcées d'utiliser les nouvelles technologies pour résoudre leurs propres problèmes quotidiens. Si votre cœur de métier dépend de l'invention de l'Avant-Poste pour ses opérations, le rejet financier devient impossible. Si vous voulez disrupter votre industrie, assurez-vous que votre propre équipe prenne la première bouchée.</p>`
                    },
                    {

                        cat: "Management & Stratégie",
                        title: "Du Canevas à la Boussole : Connecter le Business Model aux Trois Horizons de McKinsey.",
                        desc: "Bâtir un système d'exploitation stratégique complet.",
                        socialUrl: "https://www.linkedin.com/pulse/du-canevas-%25C3%25A0-la-boussole-connecter-le-business-model-aux-b-sauro-anvne",
                        full: `<p>Le Business Model Canvas (BMC) est un outil redoutable pour cartographier la proposition de valeur et les segments clients à un instant précis. Cependant, un modèle d'affaires n'est jamais statique. Dès que vous projetez ce canevas dans le temps, le besoin d'une feuille de route devient évident. C'est ici qu'interviennent les Trois Horizons de croissance de McKinsey & Company.</p>
                        <ul><li><strong>L'Horizon 1 est la Stabilisation</strong> : Le BMC définit ce que fait votre cœur de métier aujourd'hui pour sécuriser vos marges.</li><li><strong>L'Horizon 2 est l'Optimisation</strong> : La feuille de route dicte comment vous bâtissez vos opportunités émergentes.</li><li><strong>L'Horizon 3 est la Propulsion</strong> : Le cadre vous force à financer les paris disruptifs nécessaires à votre survie future.</li></ul>
                        <p>Le Canevas sécurise votre base, la feuille de route optimise votre croissance et les Trois Horizons propulsent votre avenir. La planification stratégique n'est pas une collection d'outils isolés.</p>`
                    }

                metrics: ["8x Growth · Turnaround", "$55M Quota Managed", "Top 5% Strategic Leader", "20+ Years Experience", "MBA · Adm.A · C.M.C."],
                articles: [
                    { id: "art1", cat: "Innovation & Governance", title: "Have We Forgotten the Definition of \"Innovation\"?", desc: "Why we confuse polishing the past with building the future.", socialUrl: "https://www.linkedin.com/pulse/have-we-forgotten-definition-word-innovation-marc-b-sauro-u6dce", full: `<p>Innovation is about changing the game for a long-term relationship. Most companies spend their careers inside the Fortress (the core business), where metrics are too rigid. To innovate, you need an Outpost: a separate operating system whose job is to cannibalize the Fortress before a competitor does.</p><h3>The Novelty Trap</h3><p>Novelty is about making the old thing shiny. It creates a short-term transaction. Innovation is about changing the game. It creates a long-term relationship. Real innovation fits better into human life, not just on the counter.</p><h3>The Fortress vs. The Outpost</h3><p>Most of us spend our careers inside the Fortress (your core business), built on efficiency. But you cannot invent the future inside a Fortress. To innovate, you need an Outpost: a separate operating system whose job is to cannibalize the Fortress before a competitor does.</p><h3>Conclusion</h3><p>The problem is not that we do not understand innovation, but that we do not know how to manage the tension between Efficiency (which kills Discovery) and Discovery (which wastes Efficiency). This is what I call The Business Innovation Dichotomy (The BID).</p>` },
                    { id: "art2", cat: "Strategy & Leadership", title: "Strategy is a Wager, Not a Science.", desc: "The illusion of scientific certainty vs the reality of the corporate casino.", socialUrl: "https://www.linkedin.com/pulse/why-strategy-wager-science-marc-b-sauro-yblue", full: `<p>Modern business is more like a casino than a laboratory. Every fiscal year, you place your wager (BID). Standard strategy is to bet 99% on the Fortress and cover slightly on Innovation. To survive, you must recognize the gap and build the bridge. The wheel is spinning. It is time to make your BID.</p>` },
                    { id: "art3", cat: "Innovation & Governance", title: "Why the CFO Kills Your Best Ideas.", desc: "The Ugly Duckling problem in corporate strategy.", socialUrl: "https://www.linkedin.com/pulse/why-cfo-kills-your-best-ideas-marc-b-sauro-8dree", full: `<p>The CFO often kills the best ideas because they protect the Fortress using ROI metrics that don't apply to discovery. You need a Dual Operating System to create a safe zone where Ugly Ducklings can grow. If you judge an innovation by its ability to deliver immediate yield, it will die on the vine.</p>` },
                    { id: "art4", cat: "Innovation & Governance", title: "Stop Building Innovation Labs. Start Building Bridges.", desc: "The Nespresso story as strategic proof.", socialUrl: "https://www.linkedin.com/pulse/stop-building-innovation-labs-start-bridges-marc-b-sauro-4fxcc", full: `<p>Nestlé succeeded with Nespresso not by integrating it, but by exiling it to an Outpost. The real victory happened when Nestlé built the Bridge, leveraging its power to force the market into existence. If you can protect the Outpost without abandoning the Fortress, you own the game.</p>` },
                    { id: "art5", cat: "Finance & Strategy", title: "A conversation about Milton Friedman, Impatient Capital, and the 1% Wager.", desc: "Managing Impatient Capital using the 99/1 rule.", socialUrl: "https://www.linkedin.com/pulse/stop-blabbing-innovation-build-your-skunkworks-close-gap-b-sauro-z97ae", full: `<p>Corporate Finance is wired to protect predictable yield. But innovation requires Adam Smith's raw entrepreneurial risk. The solution is the 99/1 Rule: publicly commit 99% to the Fortress and isolate 1% for Smith's Outpost as an Asymmetric Call Option. Tell Wall Street exactly what game you are playing.</p>` },
                    { id: "art6", cat: "Innovation & Governance", title: "Stop blabbing about innovation, build your Skunkworks, and close the Governance Gap.", desc: "How Lockheed Martin guarantees the success of its inventions.", socialUrl: "https://www.linkedin.com/pulse/arr%25C3%25AAtez-de-parler-dinnovation-b%25C3%25A2tissez-votre-et-le-foss%25C3%25A9-b-sauro-8jp1e", full: `<p>Lockheed Martin's Skunkworks model works because of dogfooding: internal teams are forced to be their own first customers. When the core business relies on the Outpost's invention for its daily operations, financial rejection becomes impossible. Bypassing the Impatient Capital trap is the key to corporate survival.</p>` },

                        <h4 class="text-xl font-bold group-hover:translate-x-1 transition-transform leading-tight text-white">${art.title}</h4>
                    </div>
                    <p class="text-white/60 text-sm line-clamp-3 leading-relaxed mb-6 font-light">${art.desc}</p>
                    <span class="text-xs font-bold uppercase tracking-widest border-b border-white/20 pb-1 text-white group-hover:border-white transition-all">
                        ${translations[currentLang]['read-more']}
                    </span>
                </div>
            `).join('');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            initUI();
        }

        function initUI() {
            const toggleBtn = document.getElementById('lang-toggle');
            if (toggleBtn) toggleBtn.innerText = currentLang === 'fr' ? 'EN' : 'FR';
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            renderArticles();
            renderTicker();
        }

        function openPortrait() {
            document.getElementById('portrait-modal').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function closePortrait() {
            document.getElementById('portrait-modal').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        function openExp(id) {
            const data = translations[currentLang][id];
            if (!data) return;
            document.getElementById('reader-title').innerText = data.title;
            document.getElementById('reader-meta').innerText = data.role;
            document.getElementById('reader-body').innerHTML = data.full;
            const footer = document.getElementById('reader-footer');
            footer.innerHTML = (data.url && data.url !== '#') ? 
                `<a href="${data.url}" target="_blank" class="btn-ghost">${translations[currentLang]['visit-site']}</a>` : '';
            document.getElementById('reader-overlay').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function openReader(id) {
            const art = translations[currentLang].articles.find(a => a.id === id);
            if (!art) return;
            document.getElementById('reader-title').innerText = art.title;
            document.getElementById('reader-meta').innerText = art.cat;
            document.getElementById('reader-body').innerHTML = art.full;
            const footer = document.getElementById('reader-footer');
            footer.innerHTML = art.socialUrl ? `
                <a href="${art.socialUrl}" target="_blank" class="btn-social">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    ${translations[currentLang]['discuss-social']}
                </a>` : '';
            document.getElementById('reader-overlay').style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function closeReader() {
            document.getElementById('reader-overlay').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        function scrollSlider(direction) {
            document.getElementById('logo-slider').scrollBy({ left: direction * 240, behavior: 'smooth' });
        }

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const zoomBg = document.getElementById('zoom-bg');
            if(zoomBg) zoomBg.style.transform = `scale(${1 + (scroll * 0.00025)})`;
            document.querySelectorAll('section').forEach(sec => {
                if(sec.getBoundingClientRect().top < window.innerHeight * 0.95) sec.classList.add('visible');
            });
        });

        window.onload = () => {
            initUI();
            const slider = document.getElementById('logo-slider');
            if (slider) {
                const items = Array.from(slider.children);
                items.forEach(item => slider.appendChild(item.cloneNode(true)));
            }
        };
    </script>
</body>
</html>
