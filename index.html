<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marc B. Sauro | Partenaire Client Senior</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette Institutionnelle BDC */
            --bdc-blue: #0b1a30;
            --bdc-red: #ee3124;
            --bdc-white: #ffffff;
            --bdc-bg-dark: #050c18;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bdc-bg-dark);
            color: var(--bdc-white);
            margin: 0;
            overflow-x: hidden;
        }

        body.modal-open {
            overflow: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -10;
            overflow: hidden;
        }

        #zoom-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.1s ease-out;
            filter: brightness(1.15) contrast(1.1) saturate(1.1);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(11, 26, 48, 0.2) 0%, var(--bdc-bg-dark) 95%);
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .nav-blur {
            background: rgba(5, 12, 24, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .red-line-major {
            border-left: 4px solid var(--bdc-red);
        }

        .red-line-minor {
            border-left: 2px solid var(--bdc-red);
        }

        .accent-line-title {
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.5rem;
            color: var(--bdc-white);
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .text-accent {
            color: var(--bdc-red);
            font-weight: 700;
        }

        section {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- DESIGN DU BANDEAU DÉFILANT (EXECUTIVE TICKER) --- */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.25rem 0;
            backdrop-filter: blur(10px);
        }

        .ticker {
            display: flex;
            white-space: nowrap;
            /* Allure moyenne : 45 secondes pour un cycle complet */
            animation: ticker-animation 45s linear infinite;
        }

        .ticker:hover {
            animation-play-state: paused;
        }

        @keyframes ticker-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            padding-right: 2.5rem;
        }

        .ticker-segment {
            border-left: 3px solid var(--bdc-red);
            padding-left: 1.25rem;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            color: var(--bdc-white);
            text-transform: uppercase;
        }

        /* --- LOGO BOXES --- */
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            min-height: 11rem;
            width: 14rem;
            background: rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            padding: 1.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .logo-box:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--bdc-red);
            transform: translateY(-5px);
        }

        .company-label {
            color: var(--bdc-white);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.9;
            transition: all 0.3s ease;
            text-align: center;
            line-height: 1.4;
        }

        .logo-box:hover .company-label {
            opacity: 1;
            color: var(--bdc-red);
            font-weight: 700;
        }

        .logo-img {
            max-height: 55px;
            max-width: 90%;
            object-fit: contain;
            filter: brightness(0) invert(1) opacity(0.8);
            transition: all 0.6s ease;
        }

        .logo-box:hover .logo-img {
            filter: brightness(0) invert(1) opacity(1);
        }

        .scroll-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            color: white;
        }

        .scroll-btn:hover {
            background: var(--bdc-red);
            box-shadow: 0 0 25px rgba(238, 49, 36, 0.4);
        }

        #reader-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bdc-blue);
            z-index: 1000;
            overflow-y: auto;
            padding: 4rem 1.5rem;
        }

        .reader-content {
            max-width: 850px;
            margin: 0 auto;
            background: var(--bdc-white);
            color: #1a1a1a;
            padding: 4.5rem;
            border-radius: 2px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
        }

        .article-body h3 {
            font-weight: 700;
            color: var(--bdc-blue);
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
            border-left: 4px solid var(--bdc-red);
            padding-left: 1.25rem;
        }

        .article-body p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: #333;
        }

        .article-body ul {
            margin-bottom: 1.5rem;
            list-style-type: none;
            padding-left: 0;
        }

        .article-body li {
            margin-bottom: 0.75rem;
            padding-left: 1.5rem;
            position: relative;
            line-height: 1.7;
        }

        .article-body li::before {
            content: "•";
            color: var(--bdc-red);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        .reader-close {
            position: fixed;
            top: 2.5rem;
            right: 2.5rem;
            background: var(--bdc-red);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-social {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 2rem;
            border: 2px solid #0077b5;
            color: #0077b5;
            padding: 0.8rem 1.5rem;
            border-radius: 2px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        .btn-social:hover {
            background: #0077b5;
            color: white;
        }

        .nav-identity {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar-container {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: var(--bdc-blue);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #bfdbfe; /* blue-200 */
            margin-bottom: 2rem;
            opacity: 0.7;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>

        let currentLang = 'en';

        function renderTicker() {
            const container = document.getElementById('ticker-container');
            if (!container) return;
            const data = translations[currentLang].metrics;
            const tickerHtml = data.map(m => `<div class="ticker-segment">${m}</div>`).join('');
            container.innerHTML = `<div class="ticker-item">${tickerHtml}</div><div class="ticker-item">${tickerHtml}</div>`;
        }

        function renderArticles() {
            const grid = document.getElementById('articles-grid');
            const data = translations[currentLang].articles;
            if (!grid) return;
            grid.innerHTML = '';

            data.forEach(art => {
                const card = document.createElement('div');
                card.className = "glass p-10 cursor-pointer hover:bg-white/5 transition-all group";
                card.onclick = () => openReader(art.id);
                
                card.innerHTML = `
                    <span class="text-[10px] text-white font-bold uppercase tracking-widest mb-6 block red-line-minor pl-3">${art.cat}</span>
                    <h4 class="text-2xl font-bold mb-5 group-hover:text-accent transition-colors leading-tight">${art.title}</h4>
                    <p class="text-blue-100/60 mb-8 leading-relaxed font-light line-clamp-3">${art.desc}</p>
                    <span class="text-xs font-bold uppercase tracking-widest border-b border-accent/40 pb-1 group-hover:border-accent transition-all">
                        ${translations[currentLang]['read-more']}
                    </span>
                `;
                grid.appendChild(card);
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            const toggleBtn = document.getElementById('lang-toggle');
            if (toggleBtn) toggleBtn.innerText = currentLang === 'fr' ? 'EN' : 'FR';
            
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });

            renderArticles();
            renderTicker();
        }

        function openExp(id) {
            const overlay = document.getElementById('reader-overlay');
            document.getElementById('reader-title').innerText = translations[currentLang][id + '-title'];
            document.getElementById('reader-meta').innerText = translations[currentLang][id + '-role'];
            document.getElementById('reader-body').innerHTML = translations[currentLang][id + '-full'];
            const url = translations[currentLang][id + '-url'];
            const footer = document.getElementById('reader-footer');
            footer.innerHTML = (url && url !== '#') ? `<a href="${url}" target="_blank" class="btn-social !border-bdc-blue !text-bdc-blue hover:!bg-bdc-blue hover:!text-white">${translations[currentLang]['visit-site']}</a>` : '';
            overlay.style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function openReader(id) {
            const art = translations[currentLang].articles.find(a => a.id === id);
            if (!art) return;

            const overlay = document.getElementById('reader-overlay');
            document.getElementById('reader-title').innerText = art.title;
            document.getElementById('reader-meta').innerText = art.cat;
            document.getElementById('reader-body').innerHTML = art.full;
            
            const footer = document.getElementById('reader-footer');
            if (art.socialUrl) {
                footer.innerHTML = `
                    <a href="${art.socialUrl}" target="_blank" class="btn-social">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                        ${translations[currentLang]['discuss-social']}
                    </a>
                `;
            } else {
                footer.innerHTML = '';
            }

            overlay.style.display = 'block';
            document.body.classList.add('modal-open');
        }

        function closeReader() {
            document.getElementById('reader-overlay').style.display = 'none';
            document.body.classList.remove('modal-open');
        }

        function scrollSlider(direction) {
            const slider = document.getElementById('logo-slider');
            const firstChild = slider.querySelector('.logo-box');
            if (!firstChild) return;
            const cardWidth = firstChild.offsetWidth + 24;
            slider.scrollBy({ left: direction * cardWidth, behavior: 'smooth' });
        }

        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const zoomBg = document.getElementById('zoom-bg');
            if (zoomBg) zoomBg.style.transform = `scale(${1 + (scroll * 0.00035)})`;
            document.querySelectorAll('section').forEach(section => {
                if (section.getBoundingClientRect().top < window.innerHeight * 0.88) section.classList.add('visible');
            });
        });

        window.onload = function() {
            // Initialisation infinie pour les logos
            const slider = document.getElementById('logo-slider');
            const items = Array.from(slider.children);
            items.forEach(item => slider.appendChild(item.cloneNode(true)));
            items.forEach(item => slider.appendChild(item.cloneNode(true)));
            slider.scrollLeft = slider.scrollWidth / 3;

            window.dispatchEvent(new Event('scroll'));
            toggleLanguage(); 
        };
    </script>
